# Fixed app theme — locks the purple light theme for every visitor,
# regardless of their browser/OS dark-mode preference. Without this,
# Streamlit's dark base theme renders white text over the light purple
# backgrounds and parts of the UI become unreadable.
[theme]
base = "light"
primaryColor = "#6C63FF"
backgroundColor = "#F8F7FF"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1F2140"
font = "sans serif"

[browser]
gatherUsageStats = false
