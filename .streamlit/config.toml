# Locked light theme so every visitor sees the same accessible brand palette,
# regardless of browser or operating-system dark-mode preferences.
[theme]
base = "light"
primaryColor = "#0F766E"
backgroundColor = "#F3F7FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#102A43"
font = "sans serif"

[browser]
gatherUsageStats = false
